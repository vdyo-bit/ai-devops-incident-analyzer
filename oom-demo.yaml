apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-demo
  template:
    metadata:
      labels:
        app: oom-demo
    spec:
      containers:
      - name: memory-hog
        image: polinux/stress
        resources:
          limits:
            memory: "64Mi"
          requests:
            memory: "32Mi"
        command:
        - stress
        - "--vm"
        - "1"
        - "--vm-bytes"
        - "128M"
        - "--vm-hang"
        - "1"
